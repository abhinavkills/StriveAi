<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hestia Menu</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: 'Segoe UI', sans-serif;
    }

    .layer {
        position: absolute;
        width: 110%;
        height: 110%;
        background-size: cover;
        background-position: center;
        transition: transform 0.1s ease-out;
    }

    /* Replace these with your image slices */
    #bg-back {
        background: url('your_background.jpg');
        opacity: 0.3;
        z-index: 1;
    }

    #bg-mid {
        background: url('your_background.jpg');
        opacity: 0.5;
        z-index: 2;
    }

    #bg-front {
        background: url('your_background.jpg');
        opacity: 0.8;
        z-index: 3;
    }

    /* Fog layer */
    .fog {
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(0,255,150,0.05), transparent);
        animation: fogMove 20s linear infinite;
        z-index: 4;
    }

    @keyframes fogMove {
        from { transform: translateX(-10%); }
        to { transform: translateX(10%); }
    }

    /* Glow effect */
    .glow {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(255,140,0,0.3), transparent);
        animation: pulse 3s infinite;
        z-index: 5;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: translateX(-50%) scale(1); }
        50% { opacity: 0.6; transform: translateX(-50%) scale(1.1); }
    }

    /* Menu UI */
    .menu {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        text-align: center;
    }

    .title {
        color: #f5c27a;
        font-size: 48px;
        margin-bottom: 20px;
        letter-spacing: 4px;
    }

    .btn {
        display: block;
        margin: 10px auto;
        padding: 12px 30px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        border: 1px solid #f5c27a;
        cursor: pointer;
        transition: all 0.3s;
        width: 200px;
    }

    .btn:hover {
        background: #f5c27a;
        color: black;
        transform: scale(1.05);
        box-shadow: 0 0 15px #f5c27a;
    }

    /* Particles */
    .particle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(255,255,255,0.5);
        border-radius: 50%;
        animation: float 10s linear infinite;
    }

    @keyframes float {
        from { transform: translateY(100vh); opacity: 0; }
        to { transform: translateY(-10vh); opacity: 1; }
    }
</style>
</head>

<body>

<div id="bg-back" class="layer"></div>
<div id="bg-mid" class="layer"></div>
<div id="bg-front" class="layer"></div>

<div class="fog"></div>
<div class="glow"></div>

<div class="menu">
    <div class="title">HESTIA</div>
    <button class="btn">Begin Journey</button>
    <button class="btn">How to Play</button>
    <button class="btn">About Us</button>
</div>

<script>
    const layers = document.querySelectorAll('.layer');

    document.addEventListener('mousemove', (e) => {
        let x = (e.clientX / window.innerWidth - 0.5);
        let y = (e.clientY / window.innerHeight - 0.5);

        layers[0].style.transform = `translate(${x*10}px, ${y*10}px)`;
        layers[1].style.transform = `translate(${x*20}px, ${y*20}px)`;
        layers[2].style.transform = `translate(${x*30}px, ${y*30}px)`;
    });

    // Generate particles
    for(let i = 0; i < 30; i++){
        let p = document.createElement("div");
        p.classList.add("particle");
        p.style.left = Math.random() * 100 + "vw";
        p.style.animationDuration = (5 + Math.random()*5) + "s";
        document.body.appendChild(p);
    }
</script>

</body>
</html>
